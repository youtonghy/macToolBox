name: ToolBox
options:
  bundleIdPrefix: com.youtonghy
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  ToolBox:
    type: application
    platform: macOS
    sources:
      - Sources/ToolBox
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: ToolBox
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youtonghy.toolbox
        PRODUCT_NAME: ToolBox
        CODE_SIGN_ENTITLEMENTS: Resources/ToolBox.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
